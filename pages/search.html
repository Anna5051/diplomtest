  <main class="search-page">

          <button class="tag-chip" data-tag="adventure">Приключения</button>
          <button class="tag-chip" data-tag="story">Истории</button>

      <a href="/pages/docs/cookies.html">Cookie</a>
      <span class="app-doc-footer-sep" aria-hidden="true">·</span>
      <a href="/pages/docs/about.html">О сервисе</a>

  <script>
    const brandLink = document.querySelector(".brand");
    if (brandLink) {
      brandLink.href = localStorage.getItem("user")
        ? "/pages/main.html"
        : "/pages/index.html";
    }

    const savedUser = JSON.parse(localStorage.getItem("user") || "null");
    const globalSearchInput = document.getElementById("globalSearchInput");
    const topSearchForm = document.getElementById("topSearchForm");
    const tagCloud = document.getElementById("tagCloud");
    const excludeTagCloud = document.getElementById("excludeTagCloud");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");
    const charactersGrid = document.getElementById("charactersGrid");
    const foundText = document.getElementById("foundText");
    const statusBox = document.getElementById("statusBox");
    const topAvatar = document.getElementById("topAvatar");
    const sortSelect = document.getElementById("sortSelect");
    const excludedTagsPreview = document.getElementById("excludedTagsPreview");
    const quickFilters = document.getElementById("quickFilters");

    let allBots = [];
    const favoriteBotIds = new Set();
    let activeTags = new Set();
    let isAllTagsSelected = false;
    let quickFilter = "all";
    let excludedTags = [];
    const EXCLUDED_TAGS_STORAGE_KEY = `excludedSearchTags_${savedUser?.id || "guest"}`;
    const FORBIDDEN_TAGS = new Set([
      "18+",
      "16+",
      "18_",
      "16_",
      "18plus",
      "16plus",
      "18_plus",
      "18_+",
      "16_+",
      "r18",
      "mature",
      "adult",
      "nsfw",
      "porn",
      "porno",
      "порно",
      "sex",
      "секс",
      "xxx",
      "bdsm",
      "эротика",
      "hentai",
      "хентай",
      "wlw",
      "mlm",
      "poly",
      "polyamory",
      "полиамория",
      "submissive",
      "dominant",
      "сабмиссив",
      "доминант",
      "flirt",
      "флирт",
      "politics",
      "religion",
      "политика",
      "религия",
    ]);

    const savedAvatar =
      localStorage.getItem(`profileAvatar_${savedUser?.id || ""}`) ||
      savedUser?.avatar_url ||
      "";

    if (savedAvatar) {
      topAvatar.src = savedAvatar;
    }

    function normalizeText(value) {
      return String(value || "").toLowerCase().trim();
    }

    /** Как в config/tagPolicy.js — для скрытия меток на карточках */
    function normalizeTagKeySearch(raw) {
      return String(raw ?? "")
        .trim()
        .normalize("NFKC")
        .replace(/^#+/g, "")
        .replace(/\+/g, "_")
        .replace(/,/g, "_")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .toLowerCase();
    }

    function isForbiddenTagSearch(key) {
      const k = normalizeTagKeySearch(key);
      if (!k || k === "all") return true;
      if (FORBIDDEN_TAGS.has(k)) return true;
      const parts = k.split("_").filter(Boolean);
      for (const part of parts) {
        if (FORBIDDEN_TAGS.has(part)) return true;
      }
      for (let i = 0; i < parts.length - 1; i += 1) {
        if (parts[i] === "18" && parts[i + 1] === "plus") return true;
        if (parts[i] === "16" && parts[i + 1] === "plus") return true;
      }
      return false;
    }

    function parseExcludedTagsInput(value) {
      return String(value || "")
        .split(",")
        .map((tag) => normalizeText(tag))
        .filter(Boolean)
        .filter((tag, index, arr) => arr.indexOf(tag) === index)
        .slice(0, 20);
    }

    function syncExcludedTagsPreview() {
      excludedTagsPreview.innerHTML = "";
      if (!excludedTags.length) {
        excludedTagsPreview.textContent = "Не исключено";
        return;
      }
      excludedTags.forEach((tag) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "excluded-tag-chip";
        btn.dataset.tag = tag;
        btn.textContent = `${translateTag(tag)} ×`;
        btn.addEventListener("click", () => {
          excludedTags = excludedTags.filter((t) => t !== tag);
          saveExcludedTags();
          syncExcludeTagUI();
          applyFilters();
        });
        excludedTagsPreview.appendChild(btn);
      });
    }

    function buildExcludeTagCloud() {
      if (!excludeTagCloud || !tagCloud) return;
      excludeTagCloud.innerHTML = "";
      tagCloud.querySelectorAll('.tag-chip[data-tag]:not([data-tag="all"])').forEach((source) => {
        const tag = source.dataset.tag;
        if (!tag) return;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "tag-chip tag-chip--exclude";
        btn.dataset.tag = tag;
        btn.textContent = source.textContent.trim();
        excludeTagCloud.appendChild(btn);
      });
      syncExcludeTagUI();
    }

    function syncExcludeTagUI() {
      if (!excludeTagCloud) return;
      excludeTagCloud.querySelectorAll(".tag-chip--exclude").forEach((btn) => {
        const t = btn.dataset.tag;
        btn.classList.toggle("is-excluded", excludedTags.includes(t));
      });
    }

    function loadExcludedTags() {
      try {
        const raw = localStorage.getItem(EXCLUDED_TAGS_STORAGE_KEY);
        excludedTags = parseExcludedTagsInput(raw || "");
      } catch {
        excludedTags = [];
      }
      syncExcludeTagUI();
      syncExcludedTagsPreview();
    }

    function saveExcludedTags() {
      localStorage.setItem(EXCLUDED_TAGS_STORAGE_KEY, excludedTags.join(","));
      syncExcludeTagUI();
      syncExcludedTagsPreview();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function toStoryPreview(text) {
      const raw = String(text || "");
      if (!raw.trim()) return "";

      const div = document.createElement("div");
      div.innerHTML = raw;

      return (div.textContent || div.innerText || "")
        .replace(/\u00a0/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function extractScenarioFromPrompt(systemPrompt) {
      const prompt = String(systemPrompt || "");
      if (!prompt) return "";

      const marker = "### SCENARIO:";
      const start = prompt.indexOf(marker);
      if (start === -1) return "";

      const after = prompt.slice(start + marker.length);
      const nextMarkerIndex = after.indexOf("###");
      const scenarioBlock = nextMarkerIndex === -1 ? after : after.slice(0, nextMarkerIndex);
      return toStoryPreview(scenarioBlock);
    }

    function isTemplateLikeStory(text) {
      const normalized = String(text || "").toLowerCase();
      return (
        normalized.startsWith("имя ") ||
        normalized.includes("роль персонажа") ||
        normalized.includes("стиль общения") ||
        normalized.includes("правила ролевой игры")
      );
    }

    function getStoryText(bot) {
      const scenarioFromPrompt = extractScenarioFromPrompt(bot.system_prompt);
      if (scenarioFromPrompt) return scenarioFromPrompt;

      const shortStory = toStoryPreview(bot.short_description || bot.description || "");
      if (shortStory) return shortStory;

      const candidate = toStoryPreview(
        bot.full_description ||
        bot.story_description ||
        bot.plot ||
        ""
      );

      if (isTemplateLikeStory(candidate)) {
        return shortStory;
      }

      return candidate;
    }

    function getAvatar(bot) {
      return bot.avatar_url || bot.avatar || "../img/icon.svg";
    }

    function getBotUrl(bot) {
      return `./bot.html?id=${bot.id}`;
    }

    function getChatUrl(bot) {
      const pid = savedUser?.id
        ? localStorage.getItem(`activePersonaId_${savedUser.id}`)
        : "";
      const personaQs =
        pid && String(pid).trim() !== ""
          ? `&persona=${encodeURIComponent(pid)}`
          : "";
      return `./chat.html?id=${bot.id}${personaQs}`;
    }

    function getFavoriteBotKey(botId) {
      if (!savedUser?.id) return "";
      return `favoriteBot_${savedUser.id}_${botId}`;
    }

    async function loadFavoriteBotIds() {
      favoriteBotIds.clear();
      if (!savedUser?.id) return;
      try {
        const response = await fetch(
          `${API_BASE}/favorite-bots/${savedUser.id}`,
        );
        const data = await response.json();
        if (response.ok && Array.isArray(data.bot_ids)) {
          data.bot_ids.forEach((id) => {
            const n = Number(id);
            if (Number.isFinite(n) && n > 0) {
              favoriteBotIds.add(n);
              localStorage.setItem(getFavoriteBotKey(n), "true");
            }
          });
        }
      } catch {
        /* ignore */
      }
      const prefix = `favoriteBot_${savedUser.id}_`;
      Object.keys(localStorage).forEach((k) => {
        if (!k.startsWith(prefix)) return;
        if (localStorage.getItem(k) !== "true") return;
        const rest = k.slice(prefix.length);
        const n = Number(rest);
        if (Number.isFinite(n) && n > 0) {
          favoriteBotIds.add(n);
        }
      });
    }

    function isFavoriteBot(botId) {
      if (!savedUser?.id) return false;
      return favoriteBotIds.has(Number(botId));
    }

    async function persistFavoriteSearch(botId, wantFavorite) {
      if (!savedUser?.id) return false;
      const bid = Number(botId);
      const uid = Number(savedUser.id);
      const key = getFavoriteBotKey(botId);
      try {
        if (wantFavorite) {
          const response = await fetch(`${API_BASE}/favorite-bots`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: uid, bot_id: bid }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || "Не удалось добавить в избранное");
          }
          favoriteBotIds.add(bid);
        } else {
          const url = `${API_BASE}/favorite-bots?user_id=${encodeURIComponent(uid)}&bot_id=${encodeURIComponent(bid)}`;
          const response = await fetch(url, {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: uid, bot_id: bid }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.message || "Не удалось убрать из избранного");
          }
          favoriteBotIds.delete(bid);
        }
        localStorage.setItem(key, String(wantFavorite));
        return true;
      } catch (e) {
        notifyUser(e.message || "Ошибка избранного", "error");
        return false;
      }
    }

    function syncActiveTagUI() {
      tagCloud.querySelectorAll(".tag-chip").forEach((item) => {
        if (item.dataset.tag === "all") {
          item.classList.toggle("active", isAllTagsSelected);
          return;
        }
        item.classList.toggle("active", activeTags.has(item.dataset.tag));
      });
    }

    function formatTags(tagsString) {
      if (!tagsString || !tagsString.trim()) return [];

      return tagsString
        .split(",")
        .map((tag) => tag.trim())
        .filter(Boolean)
        .filter((tag) => !isForbiddenTagSearch(tag))
        .slice(0, 4);
    }

    function translateTag(tag) {
      const key = String(tag || "").trim().toLowerCase().replace(/\s+/g, "_");
      const map = {
        romance: "Романтика",
        drama: "Драма",
        rp: "Ролевые сценарии",
        dark: "Тёмные сюжеты",
        dark_fantasy: "Тёмное фэнтези",
        fantasy: "Фэнтези",
        anime: "Аниме",
        adventure: "Приключения",
        story: "Истории",
        villain: "Злодеи",
        hero: "Герои",
        mystery: "Мистика",
        magic: "Магия",
        slowburn: "Медленное развитие",
        enemies: "От ненависти до любви",
        oc: "Оригинальные персонажи",
        scenario: "Сценарные",
        male: "Мужской POV",
        female: "Женский POV",
        nonhuman: "Нелюди",
        historical: "Исторические",
        school: "Школьные",
        office: "Офисные",
        mafia: "Мафия",
        detective: "Детектив",
        vampire: "Вампиры",
        robot: "Роботы",
        scifi: "Научная фантастика",
        "sci-fi": "Научная фантастика",
        comedy: "Комедия",
        angst: "Ангст",
        royalty: "Королевские",
        monster: "Монстры",
        assistant: "Ассистенты",
        beginning: "Для новичков",
        music: "Музыкальные",
        cyberpunk: "Киберпанк",
        analytics: "Аналитика",
        street: "Уличные сюжеты",
        space: "Космос",
        command: "Командование",
        tactical: "Тактика",
        engineering: "Инженерия",
        logic: "Логика",
        gothic: "Готика",
        history: "Исторические",
        archive: "Архивные",
        scholar: "Ученые",
        nature: "Природа",
        soft: "Мягкий стиль",
        city: "Городские",
        slice_of_life: "Повседневность",
        ru: "Русский",
      };
      return map[key] || tag;
    }

    function isTagSelected(tag) {
      if (!activeTags.size) return false;
      const normalizedTag = normalizeText(tag);
      return Array.from(activeTags).some((selected) => {
        const normalizedSelected = normalizeText(selected);
        return (
          normalizedTag === normalizedSelected ||
          normalizedTag.includes(normalizedSelected) ||
          normalizedSelected.includes(normalizedTag)
        );
      });
    }

    function renderBots(items) {
      charactersGrid.innerHTML = "";
      foundText.textContent = `Найдено: ${items.length}`;

      if (!items.length) {
        statusBox.style.display = "block";
        statusBox.textContent = "Персонажи не найдены";
        return;
      }

      statusBox.style.display = "none";

      items.forEach((bot) => {
        const tags = formatTags(bot.tags);
        const card = document.createElement("article");
        card.className = "character-card";
        const storyDescription = getStoryText(bot);
        const authorName = bot.author_name || bot.author || "unknown";
        const authorId = bot.creator_id || bot.author_id || "";
        const authorIdPart = authorId ? `authorId=${encodeURIComponent(authorId)}&` : "";
        const authorProfileUrl = `/pages/profile.html?${authorIdPart}username=${encodeURIComponent(authorName)}`;

        card.innerHTML = `
          <div class="character-image-wrap">
            <a href="${getBotUrl(bot)}" class="character-image">
              <img src="${getAvatar(bot)}" alt="${escapeHtml(bot.name)}" />
            </a>
            <button
              type="button"
              class="heart favorite-heart-btn ${isFavoriteBot(bot.id) ? "active" : ""}"
              data-bot-id="${bot.id}"
              aria-label="Избранное"
              ${savedUser?.id ? "" : "disabled"}
            >❤</button>
          </div>

          <div class="character-body">
            <div class="character-title-row">
              <div>
                <h3>
                  <a href="${getBotUrl(bot)}">${escapeHtml(bot.name || "Без имени")}</a>
                </h3>
                <p class="character-author">
                  <a href="${authorProfileUrl}" class="author-link">@${escapeHtml(authorName)}</a>
                </p>
                <p class="character-story">
                  ${escapeHtml(storyDescription || "Сюжет пока не добавлен")}
                </p>
              </div>
            </div>

            <div class="character-tags">
              ${
                tags.length
                  ? tags
                      .map((tag) => {
                        const displayTag = translateTag(tag);
                        const activeClass = isTagSelected(tag) || isTagSelected(displayTag)
                          ? "active"
                          : "";
                        return `<span class="${activeClass}">${escapeHtml(displayTag)}</span>`;
                      })
                      .join("")
                  : `<span>Без тегов</span>`
              }
            </div>

            <div class="character-actions">
              <a href="${getBotUrl(bot)}" class="card-btn">Открыть</a>
              <a href="${getChatUrl(bot)}" class="card-btn primary">Чат</a>
            </div>
          </div>
        `;

        const heartBtn = card.querySelector(".favorite-heart-btn");
        if (heartBtn && savedUser?.id) {
          heartBtn.addEventListener("click", async (event) => {
            event.preventDefault();
            event.stopPropagation();
            const id = Number(heartBtn.dataset.botId);
            if (!Number.isFinite(id) || id < 1) return;
            const was = favoriteBotIds.has(id);
            const next = !was;
            heartBtn.classList.toggle("active", next);
            const ok = await persistFavoriteSearch(id, next);
            if (!ok) {
              heartBtn.classList.toggle("active", was);
            }
          });
        }

        charactersGrid.appendChild(card);
      });
    }

    function applyFilters() {
      const query = globalSearchInput ? normalizeText(globalSearchInput.value) : "";
      const sort = sortSelect.value;

      let filtered = [...allBots];

      if (query) {
        filtered = filtered.filter((bot) => {
          const haystack = normalizeText(`
            ${bot.name}
            ${bot.short_description}
            ${bot.full_description}
            ${bot.tags}
            ${bot.author_name}
          `);

          return haystack.includes(query);
        });
      }

      if (!isAllTagsSelected && activeTags.size > 0) {
        filtered = filtered.filter((bot) =>
          Array.from(activeTags).some((tag) =>
            normalizeText(bot.tags).includes(normalizeText(tag))
          )
        );
      }

      if (excludedTags.length) {
        filtered = filtered.filter((bot) => {
          const botTags = normalizeText(bot.tags);
          return !excludedTags.some(
            (excluded) =>
              botTags.includes(excluded) ||
              botTags.includes(excluded.replace(/\s+/g, "_"))
          );
        });
      }

      if (quickFilter === "favorites") {
        filtered = filtered.filter((bot) => isFavoriteBot(bot.id));
      }

      if (sort === "name") {
        filtered.sort((a, b) =>
          String(a.name || "").localeCompare(String(b.name || ""))
        );
      }

      if (sort === "author") {
        filtered.sort((a, b) =>
          String(a.author_name || "").localeCompare(String(b.author_name || ""))
        );
      }

      if (sort === "new") {
        filtered.sort((a, b) => {
          const dateA = new Date(a.created_at || 0).getTime();
          const dateB = new Date(b.created_at || 0).getTime();
          return dateB - dateA;
        });
      }

      if (sort === "popular") {
        filtered.sort(
          (a, b) => Number(b.tokens_count || 0) - Number(a.tokens_count || 0)
        );
      }

      renderBots(filtered);
    }

    async function loadBots() {
      try {
        if (savedUser?.id) {
          await loadFavoriteBotIds();
        } else {
          favoriteBotIds.clear();
        }

        const response = await fetch(`${API_BASE}/all-bots`);

        if (!response.ok) {
          throw new Error("Ошибка загрузки персонажей");
        }

        const data = await response.json();
        allBots = Array.isArray(data) ? data : [];
        applyFilters();
      } catch (error) {
        notifyUser("Не удалось загрузить персонажей с сервера", "error");

        allBots = [
          {
            id: 1,
            name: "Aurelia Fairy Princess",
            author_name: "demo",
            short_description: "Магическая принцесса из сказочного мира.",
            avatar_url: "../img/icon.svg",
            tags: "fantasy, magic, story",
            visibility: "public",
            messages_count: 120,
            tokens_count: 5400,
            created_at: new Date().toISOString()
          },
          {
            id: 2,
            name: "Dark Storyteller",
            author_name: "demo",
            short_description: "Персонаж для мрачных сюжетов и загадочных историй.",
            avatar_url: "../img/icon.svg",
            tags: "mystery, drama, villain",
            visibility: "public",
            messages_count: 88,
            tokens_count: 4100,
            created_at: new Date().toISOString()
          }
        ];

        statusBox.style.display = "block";
        statusBox.textContent =
          "Сервер не подключён. Показаны демо-персонажи.";
        applyFilters();
      }
    }

    if (topSearchForm) {
      topSearchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        applyFilters();
      });
    }

    if (globalSearchInput) {
      globalSearchInput.addEventListener("input", applyFilters);
    }

    tagCloud.addEventListener("click", (e) => {
      const chip = e.target.closest(".tag-chip");
      if (!chip) return;
      const selectedTag = chip.dataset.tag;

      if (selectedTag === "all") {
        isAllTagsSelected = !isAllTagsSelected;
        if (isAllTagsSelected) {
          activeTags = new Set();
        }
        syncActiveTagUI();
        applyFilters();
        return;
      }

      if (isAllTagsSelected) {
        isAllTagsSelected = false;
      }

      if (activeTags.has(selectedTag)) {
        activeTags.delete(selectedTag);
      } else {
        activeTags.add(selectedTag);
        excludedTags = excludedTags.filter((t) => t !== selectedTag);
        saveExcludedTags();
      }

      syncActiveTagUI();
      syncExcludeTagUI();
      applyFilters();
    });

    excludeTagCloud.addEventListener("click", (e) => {
      const chip = e.target.closest(".tag-chip--exclude");
      if (!chip) return;
      const tag = chip.dataset.tag;
      if (!tag) return;

      const idx = excludedTags.indexOf(tag);
      if (idx >= 0) {
        excludedTags.splice(idx, 1);
      } else {
        excludedTags.push(tag);
        excludedTags = excludedTags.filter((t, i, arr) => arr.indexOf(t) === i);
        activeTags.delete(tag);
        if (activeTags.size === 0) {
          isAllTagsSelected = false;
        }
        syncActiveTagUI();
      }

      saveExcludedTags();
      applyFilters();
    });

    sortSelect.addEventListener("change", applyFilters);

    resetFiltersBtn.addEventListener("click", () => {
      if (globalSearchInput) {
        globalSearchInput.value = "";
      }
      activeTags = new Set();
      isAllTagsSelected = false;
      quickFilter = "all";
      sortSelect.value = "popular";
      excludedTags = [];
      saveExcludedTags();
      syncActiveTagUI();
      syncExcludeTagUI();
      quickFilters.querySelectorAll(".quick-chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.quick === "all");
      });

      applyFilters();
    });

    quickFilters.addEventListener("click", (event) => {
      const button = event.target.closest(".quick-chip");
      if (!button) return;
      quickFilter = button.dataset.quick || "all";
      quickFilters.querySelectorAll(".quick-chip").forEach((chip) => {
        chip.classList.toggle("active", chip === button);
      });
      applyFilters();
    });

    buildExcludeTagCloud();
    syncActiveTagUI();
    loadExcludedTags();
    loadBots();
  </script>
</body>
</html>
