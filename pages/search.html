<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Поиск персонажей — Charitor.ai</title>
  <link rel="stylesheet" href="../css/general.css" />
  <link rel="stylesheet" href="../css/search.css" />
</head>
<body>
  <header class="search-topbar">
    <div class="topbar-left">
      <a href="/pages/main.html" class="brand">Charitor.ai</a>
    </div>

    <form class="top-search" id="topSearchForm">
      <input
        type="text"
        id="globalSearchInput"
        placeholder="Поиск персонажей, авторов, тегов..."
      />
      <button type="submit">⌕</button>
    </form>

    <div class="topbar-right">
      <a href="./profile.html" class="profile-mini">
        <img id="topAvatar" src="../img/icon.svg" alt="avatar" />
      </a>
    </div>
  </header>

  <main class="search-page">
    <section class="tags-panel">
      <div class="tags-strip">
        <button type="button" class="tags-icon-btn" id="clearTagsBtn" aria-label="Сбросить теги">×</button>
        <div class="tag-cloud" id="tagCloud">
          <button class="tag-chip" data-tag="all">Все</button>
          <button class="tag-chip" data-tag="romance">Романтика</button>
          <button class="tag-chip" data-tag="drama">Драма</button>
          <button class="tag-chip" data-tag="rp">Ролевые сценарии</button>
          <button class="tag-chip" data-tag="dark">Тёмные сюжеты</button>
          <button class="tag-chip" data-tag="fantasy">Фэнтези</button>
          <button class="tag-chip" data-tag="anime">Аниме</button>
          <button class="tag-chip" data-tag="adventure">Приключения</button>
          <button class="tag-chip" data-tag="story">Истории</button>
          <button class="tag-chip" data-tag="mature">18+</button>
          <button class="tag-chip" data-tag="flirt">Флирт</button>
          <button class="tag-chip" data-tag="villain">Злодеи</button>
          <button class="tag-chip" data-tag="hero">Герои</button>
          <button class="tag-chip" data-tag="mystery">Мистика</button>
          <button class="tag-chip" data-tag="magic">Магия</button>
          <button class="tag-chip" data-tag="slowburn">Медленное развитие</button>
          <button class="tag-chip" data-tag="enemies">От ненависти до любви</button>
          <button class="tag-chip" data-tag="oc">Оригинальные персонажи</button>
          <button class="tag-chip" data-tag="submissive">Сабмиссив</button>
          <button class="tag-chip" data-tag="dominant">Доминант</button>
          <button class="tag-chip" data-tag="scenario">Сценарные</button>
          <button class="tag-chip" data-tag="male">Мужской POV</button>
          <button class="tag-chip" data-tag="female">Женский POV</button>
          <button class="tag-chip" data-tag="nonhuman">Нелюди</button>
          <button class="tag-chip" data-tag="historical">Исторические</button>
          <button class="tag-chip" data-tag="school">Школьные</button>
          <button class="tag-chip" data-tag="office">Офисные</button>
          <button class="tag-chip" data-tag="mafia">Мафия</button>
          <button class="tag-chip" data-tag="detective">Детектив</button>
          <button class="tag-chip" data-tag="vampire">Вампиры</button>
          <button class="tag-chip" data-tag="robot">Роботы</button>
          <button class="tag-chip" data-tag="scifi">Sci‑Fi</button>
          <button class="tag-chip" data-tag="comedy">Комедия</button>
          <button class="tag-chip" data-tag="angst">Ангст</button>
          <button class="tag-chip" data-tag="royalty">Королевские</button>
          <button class="tag-chip" data-tag="monster">Монстры</button>
          <button class="tag-chip" data-tag="assistant">Ассистенты</button>
          <button class="tag-chip" data-tag="politics">Политика</button>
          <button class="tag-chip" data-tag="religion">Религия</button>
          <button class="tag-chip" data-tag="beginning">Для новичков</button>
          <button class="tag-chip" data-tag="music">Музыкальные</button>
          <button class="tag-chip" data-tag="wlw">WLW</button>
          <button class="tag-chip" data-tag="mlm">MLM</button>
          <button class="tag-chip" data-tag="poly">Полиамория</button>
        </div>
        <button type="button" class="tags-icon-btn" id="toggleTagsBtn" aria-label="Свернуть панель">▴</button>
      </div>
    </section>

    <section class="search-layout">
      <aside class="filters-card">
        <h2>Фильтры</h2>

        <div class="filter-group">
          <div class="filter-title">Доступность</div>
          <label class="filter-check">
            <input type="checkbox" id="only16" />
            <span></span>
            Только 16+
          </label>
        </div>

        <div class="filter-group">
          <div class="filter-title">Сортировка</div>
          <select id="sortSelect">
            <option value="popular">Популярные</option>
            <option value="new">Новые</option>
            <option value="name">По имени</option>
            <option value="author">По автору</option>
          </select>
        </div>

        <div class="filter-group">
          <div class="filter-title">Сообщения</div>
          <input id="messagesMin" type="number" min="0" class="filter-input" placeholder="Не меньше" />
        </div>

        <div class="filter-group">
          <div class="filter-title">Токены</div>
          <input id="tokensMin" type="number" min="0" class="filter-input" placeholder="Не меньше" />
        </div>

        <button class="reset-btn" id="resetFiltersBtn" type="button">
          Сбросить фильтры
        </button>
      </aside>

      <section class="results-area">
        <div class="results-top">
          <div>
            <h2>Персонажи</h2>
            <p id="foundText">Найдено: 0</p>
          </div>
          <div class="quick-filters" id="quickFilters">
            <button type="button" class="quick-chip active" data-quick="all">Все</button>
            <button type="button" class="quick-chip" data-quick="limited">Только 16+</button>
            <button type="button" class="quick-chip" data-quick="favorites">Избранные</button>
          </div>
        </div>

        <div class="status-box" id="statusBox">
          Загрузка персонажей...
        </div>

        <div class="characters-grid" id="charactersGrid"></div>
      </section>
    </section>
  </main>

  <script>
    const brandLink = document.querySelector(".brand");
    if (brandLink) {
      brandLink.href = localStorage.getItem("user")
        ? "/pages/main.html"
        : "/pages/index.html";
    }

    const savedUser = JSON.parse(localStorage.getItem("user") || "null");
    const globalSearchInput = document.getElementById("globalSearchInput");
    const topSearchForm = document.getElementById("topSearchForm");
    const tagCloud = document.getElementById("tagCloud");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");
    const charactersGrid = document.getElementById("charactersGrid");
    const foundText = document.getElementById("foundText");
    const statusBox = document.getElementById("statusBox");
    const topAvatar = document.getElementById("topAvatar");
    const only16 = document.getElementById("only16");
    const sortSelect = document.getElementById("sortSelect");
    const messagesMin = document.getElementById("messagesMin");
    const tokensMin = document.getElementById("tokensMin");
    const quickFilters = document.getElementById("quickFilters");
    const clearTagsBtn = document.getElementById("clearTagsBtn");
    const toggleTagsBtn = document.getElementById("toggleTagsBtn");

    let allBots = [];
    let activeTags = new Set();
    let isAllTagsSelected = false;
    let quickFilter = "all";
    let isTagsCollapsed = false;

    const savedAvatar =
      localStorage.getItem(`profileAvatar_${savedUser?.id || ""}`) ||
      savedUser?.avatar_url ||
      "";

    if (savedAvatar) {
      topAvatar.src = savedAvatar;
    }

    function normalizeText(value) {
      return String(value || "").toLowerCase().trim();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function toStoryPreview(text) {
      const raw = String(text || "");
      if (!raw.trim()) return "";

      const div = document.createElement("div");
      div.innerHTML = raw;

      return (div.textContent || div.innerText || "")
        .replace(/\u00a0/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function extractScenarioFromPrompt(systemPrompt) {
      const prompt = String(systemPrompt || "");
      if (!prompt) return "";

      const marker = "### SCENARIO:";
      const start = prompt.indexOf(marker);
      if (start === -1) return "";

      const after = prompt.slice(start + marker.length);
      const nextMarkerIndex = after.indexOf("###");
      const scenarioBlock = nextMarkerIndex === -1 ? after : after.slice(0, nextMarkerIndex);
      return toStoryPreview(scenarioBlock);
    }

    function isTemplateLikeStory(text) {
      const normalized = String(text || "").toLowerCase();
      return (
        normalized.startsWith("имя ") ||
        normalized.includes("роль персонажа") ||
        normalized.includes("стиль общения") ||
        normalized.includes("правила ролевой игры")
      );
    }

    function getStoryText(bot) {
      const scenarioFromPrompt = extractScenarioFromPrompt(bot.system_prompt);
      if (scenarioFromPrompt) return scenarioFromPrompt;

      const shortStory = toStoryPreview(bot.short_description || bot.description || "");
      if (shortStory) return shortStory;

      const candidate = toStoryPreview(
        bot.full_description ||
        bot.story_description ||
        bot.plot ||
        ""
      );

      if (isTemplateLikeStory(candidate)) {
        return shortStory;
      }

      return candidate;
    }

    function getAvatar(bot) {
      return bot.avatar_url || bot.avatar || "../img/icon.svg";
    }

    function getBotUrl(bot) {
      return `./bot.html?id=${bot.id}`;
    }

    function getChatUrl(bot) {
      return `./chat.html?id=${bot.id}`;
    }

    function getFavoriteBotKey(botId) {
      if (!savedUser?.id) return "";
      return `favoriteBot_${savedUser.id}_${botId}`;
    }

    function isFavoriteBot(botId) {
      const key = getFavoriteBotKey(botId);
      return key ? localStorage.getItem(key) === "true" : false;
    }

    function syncActiveTagUI() {
      tagCloud.querySelectorAll(".tag-chip").forEach((item) => {
        if (item.dataset.tag === "all") {
          item.classList.toggle("active", isAllTagsSelected);
          return;
        }
        item.classList.toggle("active", activeTags.has(item.dataset.tag));
      });
    }

    function formatTags(tagsString) {
      if (!tagsString || !tagsString.trim()) return [];

      return tagsString
        .split(",")
        .map((tag) => tag.trim())
        .filter(Boolean)
        .slice(0, 4);
    }

    function translateTag(tag) {
      const map = {
        romance: "Романтика",
        drama: "Драма",
        rp: "Ролевые сценарии",
        dark: "Тёмные сюжеты",
        fantasy: "Фэнтези",
        anime: "Аниме",
        adventure: "Приключения",
        story: "Истории",
        magic: "Фэнтези",
        mystery: "Тёмные сюжеты",
        villain: "Тёмные сюжеты",
        hero: "Ролевые сценарии",
        oc: "Ролевые сценарии",
        "sci-fi": "Истории",
      };
      const normalized = String(tag || "").trim().toLowerCase();
      return map[normalized] || tag;
    }

    function isTagSelected(tag) {
      if (!activeTags.size) return false;
      const normalizedTag = normalizeText(tag);
      return Array.from(activeTags).some((selected) => {
        const normalizedSelected = normalizeText(selected);
        return (
          normalizedTag === normalizedSelected ||
          normalizedTag.includes(normalizedSelected) ||
          normalizedSelected.includes(normalizedTag)
        );
      });
    }

    function renderBots(items) {
      charactersGrid.innerHTML = "";
      foundText.textContent = `Найдено: ${items.length}`;

      if (!items.length) {
        statusBox.style.display = "block";
        statusBox.textContent = "Персонажи не найдены";
        return;
      }

      statusBox.style.display = "none";

      items.forEach((bot) => {
        const tags = formatTags(bot.tags);
        const card = document.createElement("article");
        card.className = "character-card";
        const storyDescription = getStoryText(bot);

        card.innerHTML = `
          <a href="${getBotUrl(bot)}" class="character-image">
            <img src="${getAvatar(bot)}" alt="${escapeHtml(bot.name)}" />
          </a>

          <div class="character-body">
            <div class="character-title-row">
              <div>
                <h3>
                  <a href="${getBotUrl(bot)}">${escapeHtml(bot.name || "Без имени")}</a>
                </h3>
                <p>@${escapeHtml(bot.author_name || bot.author || "unknown")}</p>
                <p class="character-story">
                  ${escapeHtml(storyDescription || "Сюжет пока не добавлен")}
                </p>
              </div>
              <span class="heart">❤</span>
            </div>

            <div class="character-tags">
              ${
                tags.length
                  ? tags
                      .map((tag) => {
                        const displayTag = translateTag(tag);
                        const activeClass = isTagSelected(tag) || isTagSelected(displayTag)
                          ? "active"
                          : "";
                        return `<span class="${activeClass}">${escapeHtml(displayTag)}</span>`;
                      })
                      .join("")
                  : `<span>Без тегов</span>`
              }
            </div>

            <div class="character-actions">
              <a href="${getBotUrl(bot)}" class="card-btn">Открыть</a>
              <a href="${getChatUrl(bot)}" class="card-btn primary">Чат</a>
            </div>
          </div>
        `;

        charactersGrid.appendChild(card);
      });
    }

    function applyFilters() {
      const query = normalizeText(globalSearchInput.value);
      const sort = sortSelect.value;
      const minMessages = Number(messagesMin.value) || 0;
      const minTokens = Number(tokensMin.value) || 0;

      let filtered = [...allBots];

      if (query) {
        filtered = filtered.filter((bot) => {
          const haystack = normalizeText(`
            ${bot.name}
            ${bot.short_description}
            ${bot.full_description}
            ${bot.tags}
            ${bot.author_name}
          `);

          return haystack.includes(query);
        });
      }

      if (!isAllTagsSelected && activeTags.size > 0) {
        filtered = filtered.filter((bot) =>
          Array.from(activeTags).some((tag) =>
            normalizeText(bot.tags).includes(normalizeText(tag))
          )
        );
      }

      if (only16.checked) {
        filtered = filtered.filter((bot) => {
          const haystack = normalizeText(`${bot.tags} ${bot.short_description} ${bot.full_description}`);
          return (
            haystack.includes("16+") ||
            haystack.includes("18+") ||
            haystack.includes("adult") ||
            haystack.includes("nsfw") ||
            haystack.includes("романтика") ||
            haystack.includes("драма") ||
            haystack.includes("rp")
          );
        });
      }

      if (quickFilter === "favorites") {
        filtered = filtered.filter((bot) => isFavoriteBot(bot.id));
      }

      if (quickFilter === "limited") {
        filtered = filtered.filter((bot) => {
          const haystack = normalizeText(`${bot.tags} ${bot.short_description} ${bot.full_description}`);
          return (
            haystack.includes("16+") ||
            haystack.includes("18+") ||
            haystack.includes("adult") ||
            haystack.includes("nsfw")
          );
        });
      }

      filtered = filtered.filter((bot) => Number(bot.messages_count || 0) >= minMessages);
      filtered = filtered.filter((bot) => Number(bot.tokens_count || 0) >= minTokens);

      if (sort === "name") {
        filtered.sort((a, b) =>
          String(a.name || "").localeCompare(String(b.name || ""))
        );
      }

      if (sort === "author") {
        filtered.sort((a, b) =>
          String(a.author_name || "").localeCompare(String(b.author_name || ""))
        );
      }

      if (sort === "new") {
        filtered.sort((a, b) => {
          const dateA = new Date(a.created_at || 0).getTime();
          const dateB = new Date(b.created_at || 0).getTime();
          return dateB - dateA;
        });
      }

      if (sort === "popular") {
        filtered.sort(
          (a, b) => Number(b.tokens_count || 0) - Number(a.tokens_count || 0)
        );
      }

      renderBots(filtered);
    }

    async function loadBots() {
      try {
        const response = await fetch("http://localhost:3000/all-bots");

        if (!response.ok) {
          throw new Error("Ошибка загрузки персонажей");
        }

        const data = await response.json();
        allBots = Array.isArray(data) ? data : [];
        applyFilters();
      } catch (error) {
        console.error(error);

        allBots = [
          {
            id: 1,
            name: "Aurelia Fairy Princess",
            author_name: "demo",
            short_description: "Магическая принцесса из сказочного мира.",
            avatar_url: "../img/icon.svg",
            tags: "fantasy, magic, story",
            visibility: "public",
            messages_count: 120,
            tokens_count: 5400,
            created_at: new Date().toISOString()
          },
          {
            id: 2,
            name: "Dark Storyteller",
            author_name: "demo",
            short_description: "Персонаж для мрачных сюжетов и загадочных историй.",
            avatar_url: "../img/icon.svg",
            tags: "mystery, drama, villain",
            visibility: "public",
            messages_count: 88,
            tokens_count: 4100,
            created_at: new Date().toISOString()
          }
        ];

        statusBox.style.display = "block";
        statusBox.textContent =
          "Сервер не подключён. Показаны демо-персонажи.";
        applyFilters();
      }
    }

    topSearchForm.addEventListener("submit", (e) => {
      e.preventDefault();
      applyFilters();
    });

    globalSearchInput.addEventListener("input", applyFilters);

    tagCloud.addEventListener("click", (e) => {
      const chip = e.target.closest(".tag-chip");
      if (!chip) return;
      const selectedTag = chip.dataset.tag;

      if (selectedTag === "all") {
        isAllTagsSelected = !isAllTagsSelected;
        if (isAllTagsSelected) {
          activeTags = new Set();
        }
        syncActiveTagUI();
        applyFilters();
        return;
      }

      if (isAllTagsSelected) {
        isAllTagsSelected = false;
      }

      if (activeTags.has(selectedTag)) {
        activeTags.delete(selectedTag);
      } else {
        activeTags.add(selectedTag);
      }

      syncActiveTagUI();
      applyFilters();
    });

    sortSelect.addEventListener("change", applyFilters);
    only16.addEventListener("change", applyFilters);
    messagesMin.addEventListener("input", applyFilters);
    tokensMin.addEventListener("input", applyFilters);

    resetFiltersBtn.addEventListener("click", () => {
      globalSearchInput.value = "";
      activeTags = new Set();
      isAllTagsSelected = false;
      quickFilter = "all";
      only16.checked = false;
      sortSelect.value = "popular";
      messagesMin.value = "";
      tokensMin.value = "";
      syncActiveTagUI();
      quickFilters.querySelectorAll(".quick-chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.quick === "all");
      });

      applyFilters();
    });

    quickFilters.addEventListener("click", (event) => {
      const button = event.target.closest(".quick-chip");
      if (!button) return;
      quickFilter = button.dataset.quick || "all";
      quickFilters.querySelectorAll(".quick-chip").forEach((chip) => {
        chip.classList.toggle("active", chip === button);
      });
      applyFilters();
    });

    clearTagsBtn.addEventListener("click", () => {
      activeTags = new Set();
      isAllTagsSelected = false;
      syncActiveTagUI();
      applyFilters();
    });

    toggleTagsBtn.addEventListener("click", () => {
      isTagsCollapsed = !isTagsCollapsed;
      tagCloud.classList.toggle("collapsed", isTagsCollapsed);
      toggleTagsBtn.textContent = isTagsCollapsed ? "▾" : "▴";
      toggleTagsBtn.setAttribute(
        "aria-label",
        isTagsCollapsed ? "Показать все теги" : "Показать первый ряд"
      );
    });

    syncActiveTagUI();
    loadBots();
  </script>
</body>
</html>
