<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — Charitor.ai</title>
    <link rel="stylesheet" href="/css/general.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <script src="/js/runtime-config.js"></script>
    <script src="/js/api-base.js"></script>
    <script src="/js/notifications.js" defer></script>
    <script src="/js/siteDialogs.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <a href="/pages/main.html" class="brand">Charitor.ai</a>
      </div>

      <div class="topbar-center">
        <div class="search-box">
          <input
            type="text"
            id="globalSearch"
            placeholder="Поиск в админке..."
          />
          <button type="button" aria-label="Поиск">⌕</button>
        </div>
      </div>

      <div class="topbar-right">
        <a href="/pages/history.html" class="top-icon" aria-label="Чаты">
          <svg class="topbar-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4h12v9H7l-3 3V4zm14 0h2v12h-6v-2h4V4z" />
          </svg>
        </a>
        <a href="/pages/profile.html" class="profile-mini">
          <img id="topbarAvatar" src="/img/icon.svg" alt="avatar" />
        </a>
      </div>
    </header>

    <main class="admin-shell">
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <button class="sidebar-btn active" data-tab="usersTab">
            Пользователи
          </button>
          <button class="sidebar-btn" data-tab="botsTab">Боты</button>
          <button class="sidebar-btn" data-tab="reportsTab">Жалобы</button>

        </aside>

        <section class="admin-content">
          <div id="usersTab" class="admin-tab active">
            <div class="section-head">
              <h2>Пользователи</h2>
            </div>
            <div id="usersList" class="admin-list"></div>
            <p id="usersEmpty" class="empty-state">Нет пользователей</p>
          </div>

          <div id="botsTab" class="admin-tab">
            <div class="section-head">
              <h2>Боты</h2>
            </div>

            <div id="botsGrid" class="bots-grid"></div>
            <p id="botsEmpty" class="empty-state">Нет ботов</p>
          </div>

          <div id="reportsTab" class="admin-tab">
            <div class="section-head">
              <h2>Жалобы</h2>
            </div>
            <div id="reportsList" class="admin-list"></div>
            <p id="reportsEmpty" class="empty-state">Жалоб нет</p>
          </div>

        </section>
      </div>
    </main>

    <footer class="app-doc-footer" role="contentinfo">
      <nav class="app-doc-footer-nav" aria-label="Документы и справка">
        <a href="/pages/docs/guide.html">Справка и инструкция</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/rules.html">Правила сообщества</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/faq.html">FAQ</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/privacy.html">Конфиденциальность</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/cookies.html">Cookie</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/about.html">О сервисе</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/news.html">Новости</a>
      </nav>
    </footer>

    <script>
      const brandLink = document.querySelector(".brand");
      if (brandLink) {
        brandLink.href = localStorage.getItem("user")
          ? "/pages/main.html"
          : "/pages/index.html";
      }

      const savedUser = JSON.parse(localStorage.getItem("user"));

      if (!savedUser) {
        window.location.href = "/pages/autorization.html";
      }

      if (Number(savedUser.role_id) !== 2) {
        notifyUser("Доступ только для администратора", "error");
        window.location.href = "/pages/main.html";
      }

      const topbarAvatar = document.getElementById("topbarAvatar");
      if (savedUser.avatar_url && savedUser.avatar_url.trim()) {
        topbarAvatar.src = savedUser.avatar_url;
      }

      const globalSearch = document.getElementById("globalSearch");

      const usersList = document.getElementById("usersList");
      const usersEmpty = document.getElementById("usersEmpty");

      const botsGrid = document.getElementById("botsGrid");
      const botsEmpty = document.getElementById("botsEmpty");
      const reportsList = document.getElementById("reportsList");
      const reportsEmpty = document.getElementById("reportsEmpty");

      let allUsers = [];
      let allBots = [];
      let allReports = [];

      function authHeaders() {
        return {
          "Content-Type": "application/json",
          "x-user-id": savedUser.id,
        };
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text ?? "";
        return div.innerHTML;
      }

      function translateTag(tag) {
        const key = String(tag || "").trim().toLowerCase().replace(/\s+/g, "_");
        const map = {
          romance: "Романтика",
          drama: "Драма",
          rp: "Ролевые сценарии",
          dark: "Темные сюжеты",
          fantasy: "Фэнтези",
          anime: "Аниме",
          adventure: "Приключения",
          story: "Истории",
          villain: "Злодеи",
          hero: "Герои",
          mystery: "Мистика",
          magic: "Магия",
          slowburn: "Медленное развитие",
          enemies: "От ненависти до любви",
          oc: "Оригинальные персонажи",
          scenario: "Сценарные",
          male: "Мужской POV",
          female: "Женский POV",
          nonhuman: "Нелюди",
          historical: "Исторические",
          school: "Школьные",
          office: "Офисные",
          mafia: "Мафия",
          detective: "Детектив",
          vampire: "Вампиры",
          robot: "Роботы",
          scifi: "Научная фантастика",
          "sci-fi": "Научная фантастика",
          comedy: "Комедия",
          angst: "Ангст",
          royalty: "Королевские",
          monster: "Монстры",
          assistant: "Ассистенты",
          beginning: "Для новичков",
          music: "Музыкальные",
          cyberpunk: "Киберпанк",
          analytics: "Аналитика",
          street: "Уличные сюжеты",
          space: "Космос",
          command: "Командование",
          tactical: "Тактика",
          engineering: "Инженерия",
          logic: "Логика",
          gothic: "Готика",
          history: "Исторические",
          archive: "Архивные",
          scholar: "Ученые",
          nature: "Природа",
          soft: "Мягкий стиль",
          city: "Городские",
          slice_of_life: "Повседневность",
          ru: "Русский",
        };
        return map[key] || tag;
      }

      function renderBotTags(tagsRaw) {
        const tags = String(tagsRaw || "")
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean)
          .slice(0, 6);

        if (!tags.length) return `<span class="bot-tag-chip">Нет тегов</span>`;
        return tags
          .map((tag) => `<span class="bot-tag-chip">${escapeHtml(translateTag(tag))}</span>`)
          .join("");
      }

      document.querySelectorAll(".sidebar-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".sidebar-btn").forEach((b) => {
            b.classList.remove("active");
          });

          document.querySelectorAll(".admin-tab").forEach((tab) => {
            tab.classList.remove("active");
          });

          btn.classList.add("active");
          document.getElementById(btn.dataset.tab).classList.add("active");
        });
      });

      function renderUsers(items) {
        usersList.innerHTML = "";

        if (!items.length) {
          usersEmpty.style.display = "block";
          return;
        }

        usersEmpty.style.display = "none";

        items.forEach((user) => {
          const card = document.createElement("article");
          card.className = "admin-card";
          const isAdminAccount = Number(user.role_id) === 2;
          const avatarSrc =
            String(user.avatar_url || "").trim() || "/img/icon.svg";

          card.innerHTML = `
          <div class="admin-card-body">
            <div class="user-head-admin">
              <img src="${escapeHtml(avatarSrc)}" alt="${escapeHtml(user.username || "user")}" class="user-avatar-admin" />
              <div class="user-head-meta">
                <strong>@${escapeHtml(user.username || "unknown")}</strong>
                <span>${escapeHtml(user.email || "")}</span>
                <span class="user-status-badge ${Number(user.is_blocked) === 1 ? "blocked" : "active"}">
                  ${Number(user.is_blocked) === 1 ? "Заблокирован" : "Активен"}
                </span>
              </div>
            </div>

            <div class="admin-grid">
              <label>
                <span>Username</span>
                <input type="text" class="edit-username" value="${escapeHtml(user.username)}" readonly disabled>
              </label>

              <label>
                <span>Email</span>
                <input type="text" class="edit-email" value="${escapeHtml(user.email)}" readonly disabled>
              </label>

              ${
                isAdminAccount
                  ? `<label>
                <span>Role</span>
                <input type="text" value="admin" readonly disabled>
              </label>`
                  : `<label>
                <span>Role</span>
                <select class="edit-role-id">
                  <option value="1" ${Number(user.role_id) === 1 ? "selected" : ""}>user</option>
                  <option value="2" ${Number(user.role_id) === 2 ? "selected" : ""}>admin</option>
                </select>
              </label>`
              }
            </div>

            ${
              isAdminAccount
                ? ""
                : `<div class="admin-actions">
              <button class="action-btn primary save-user-btn">Сохранить роль</button>
              <button class="action-btn ${Number(user.is_blocked) === 1 ? "warning" : "secondary"} toggle-block-user-btn">
                ${Number(user.is_blocked) === 1 ? "Разблокировать" : "Заблокировать"}
              </button>
              <button class="action-btn danger delete-user-btn">Удалить</button>
            </div>`
            }
          </div>
        `;

          if (!isAdminAccount) {
            card
              .querySelector(".save-user-btn")
              .addEventListener("click", async () => {
                const role_id = Number(card.querySelector(".edit-role-id").value);

                try {
                  const res = await fetch(
                    `${API_BASE}/admin/users/${user.id}`,
                    {
                      method: "PUT",
                      headers: authHeaders(),
                      body: JSON.stringify({ role_id }),
                    },
                  );

                  const data = await res.json();
                  notifyUser(data.message || "Готово", res.ok ? "success" : "error");
                  if (res.ok) loadUsers();
                } catch (error) {
                  notifyUser("Ошибка сохранения пользователя", "error");
                }
              });

            card
              .querySelector(".toggle-block-user-btn")
              .addEventListener("click", async () => {
                const isBlocked = Number(user.is_blocked) === 1;
                const shouldProceed = await siteConfirm(
                  isBlocked
                    ? `Разблокировать пользователя ${user.username}?`
                    : `Заблокировать пользователя ${user.username}?`,
                  {
                    title: "Подтверждение",
                    confirmText: isBlocked ? "Разблокировать" : "Заблокировать",
                    cancelText: "Отмена",
                    danger: !isBlocked,
                  },
                );
                if (!shouldProceed) return;

                try {
                  const res = await fetch(
                    `${API_BASE}/admin/users/${user.id}/block`,
                    {
                      method: "PUT",
                      headers: authHeaders(),
                      body: JSON.stringify({ is_blocked: isBlocked ? 0 : 1 }),
                    },
                  );

                  const data = await res.json();
                  notifyUser(data.message || "Готово", res.ok ? "success" : "error");
                  if (res.ok) loadUsers();
                } catch (error) {
                  notifyUser("Ошибка изменения блокировки", "error");
                }
              });

            card
              .querySelector(".delete-user-btn")
              .addEventListener("click", async () => {
                const shouldDeleteUser = await siteConfirm(
                  `Удалить пользователя ${user.username}?`,
                  {
                    title: "Подтверждение удаления",
                    confirmText: "Удалить",
                    cancelText: "Отмена",
                    danger: true,
                  },
                );
                if (!shouldDeleteUser) return;

                try {
                  const res = await fetch(
                    `${API_BASE}/admin/users/${user.id}`,
                    {
                      method: "DELETE",
                      headers: authHeaders(),
                    },
                  );

                  const data = await res.json();
                  notifyUser(data.message || "Готово", res.ok ? "success" : "error");
                  if (res.ok) loadUsers();
                } catch (error) {
                  notifyUser("Ошибка удаления пользователя", "error");
                }
              });
          }

          usersList.appendChild(card);
        });
      }

      function renderBots(items) {
        botsGrid.innerHTML = "";

        if (!items.length) {
          botsEmpty.style.display = "block";
          return;
        }

        botsEmpty.style.display = "none";

        items.forEach((bot) => {
          const card = document.createElement("article");
          card.className = "bot-card-admin";
          const authorName = bot.author_name || "Неизвестно";
          const authorIdPart = bot.creator_id
            ? `authorId=${encodeURIComponent(bot.creator_id)}&`
            : "";
          const authorProfileUrl = `/pages/profile.html?${authorIdPart}username=${encodeURIComponent(authorName)}`;

          card.innerHTML = `
          <div class="bot-image-admin">
            <a href="/pages/bot.html?id=${bot.id}">
              <img src="${escapeHtml(bot.avatar_url || "/img/icon.svg")}" alt="bot" />
            </a>
          </div>

          <div class="bot-body-admin">
            <div class="bot-top-admin">
              <div>
                <h3>
                  <a href="/pages/bot.html?id=${bot.id}">
                    ${escapeHtml(bot.name || "Без имени")}
                  </a>
                </h3>
                <p>Автор: <a href="${authorProfileUrl}" class="admin-inline-link">${escapeHtml(authorName)}</a></p>
              </div>
              <span class="bot-badge-admin">${escapeHtml(bot.visibility || "public")}</span>
            </div>

            <div class="bot-status-row">
              <span class="bot-status-badge ${Number(bot.is_blocked) === 1 ? "blocked" : "active"}">
                ${Number(bot.is_blocked) === 1 ? "Заблокирован" : "Активен"}
              </span>
            </div>

            <div class="bot-tags-admin">
              ${renderBotTags(bot.tags)}
            </div>

            <div class="bot-actions-admin">
              <a href="/pages/bot.html?id=${bot.id}" class="card-link-btn">Открыть</a>
              <a href="/pages/chat.html?id=${bot.id}" class="card-link-btn">Чат</a>
              <a href="/pages/create.html?id=${bot.id}" class="card-link-btn">Редактировать</a>
              <button class="action-btn ${Number(bot.is_blocked) === 1 ? "warning" : "secondary"} toggle-block-bot-btn">
                ${Number(bot.is_blocked) === 1 ? "Разблокировать" : "Заблокировать"}
              </button>
              <button class="action-btn danger delete-bot-btn">Удалить</button>
            </div>
          </div>
        `;

          card
            .querySelector(".toggle-block-bot-btn")
            .addEventListener("click", async () => {
              const isBlocked = Number(bot.is_blocked) === 1;
              const proceed = await siteConfirm(
                isBlocked
                  ? `Разблокировать бота ${bot.name}?`
                  : `Заблокировать бота ${bot.name}?`,
                {
                  title: "Подтверждение",
                  confirmText: isBlocked ? "Разблокировать" : "Заблокировать",
                  cancelText: "Отмена",
                  danger: !isBlocked,
                },
              );
              if (!proceed) return;

              try {
                const res = await fetch(
                  `${API_BASE}/admin/bots/${bot.id}/block`,
                  {
                    method: "PUT",
                    headers: authHeaders(),
                    body: JSON.stringify({ is_blocked: isBlocked ? 0 : 1 }),
                  },
                );

                const data = await res.json();
                notifyUser(data.message || "Готово", res.ok ? "success" : "error");
                if (res.ok) loadBots();
              } catch (error) {
                notifyUser("Ошибка изменения блокировки бота", "error");
              }
            });

          card
            .querySelector(".delete-bot-btn")
            .addEventListener("click", async () => {
              const shouldDeleteBot = await siteConfirm(`Удалить бота ${bot.name}?`, {
                title: "Подтверждение удаления",
                confirmText: "Удалить",
                cancelText: "Отмена",
                danger: true,
              });
              if (!shouldDeleteBot) return;

              try {
                const res = await fetch(
                  `${API_BASE}/admin/bots/${bot.id}`,
                  {
                    method: "DELETE",
                    headers: authHeaders(),
                  },
                );

                const data = await res.json();
                notifyUser(data.message || "Готово", res.ok ? "success" : "error");
                if (res.ok) loadBots();
              } catch (error) {
                notifyUser("Ошибка удаления бота", "error");
              }
            });

          botsGrid.appendChild(card);
        });
      }

      function formatReportDate(value) {
        const date = new Date(value || "");
        if (Number.isNaN(date.getTime())) return "—";
        return date.toLocaleString("ru-RU");
      }

      async function resolveReport(report, action) {
        const labels = {
          block: "Блокировать",
          delete: "Удалить",
          dismiss: "Отклонить",
        };
        const proceed = await siteConfirm(
          `${labels[action]} жалобу #${report.id}?`,
          {
            title: "Подтверждение",
            confirmText: labels[action],
            cancelText: "Отмена",
            danger: action === "delete",
          },
        );
        if (!proceed) return;

        try {
          const res = await fetch(`${API_BASE}/admin/reports/${report.id}/resolve`, {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({ action }),
          });
          const data = await res.json();
          notifyUser(data.message || "Готово", res.ok ? "success" : "error");
          if (res.ok) {
            loadReports();
            if (report.target_type === "bot") loadBots();
            if (report.target_type === "profile") loadUsers();
          }
        } catch {
          notifyUser("Ошибка обработки жалобы", "error");
        }
      }

      function renderReports(items) {
        reportsList.innerHTML = "";
        if (!items.length) {
          reportsEmpty.style.display = "block";
          return;
        }
        reportsEmpty.style.display = "none";

        items.forEach((report) => {
          const card = document.createElement("article");
          card.className = "admin-card";
          const targetLabel =
            report.target_type === "bot"
              ? `Бот: ${report.bot_name || `#${report.target_id}`}`
              : `Профиль: @${report.profile_name || report.target_id}`;
          const targetLink =
            report.target_type === "bot"
              ? `/pages/bot.html?id=${encodeURIComponent(report.target_id)}`
              : `/pages/profile.html?authorId=${encodeURIComponent(report.target_id)}&username=${encodeURIComponent(report.profile_name || "")}`;
          const reporterLink = `/pages/profile.html?authorId=${encodeURIComponent(report.reporter_id || "")}&username=${encodeURIComponent(report.reporter_name || "")}`;
          const statusLabel =
            report.status === "pending"
              ? "Ожидает"
              : report.status === "accepted"
                ? "Принята"
                : "Отклонена";

          card.innerHTML = `
            <div class="admin-card-body">
              <div class="user-head-admin">
                <div class="user-head-meta">
                  <strong>Жалоба #${report.id}</strong>
                  <span>От: <a href="${reporterLink}" class="admin-inline-link">@${escapeHtml(report.reporter_name || report.reporter_id || "unknown")}</a></span>
                  <span><a href="${targetLink}" class="admin-inline-link">${escapeHtml(targetLabel)}</a></span>
                  <span>${escapeHtml(statusLabel)} · ${escapeHtml(formatReportDate(report.created_at))}</span>
                </div>
              </div>

              <div class="admin-grid">
                <label class="full-width">
                  <span>Причина</span>
                  <input type="text" value="${escapeHtml(report.reason || "")}" readonly disabled>
                </label>
                <label class="full-width">
                  <span>Детали</span>
                  <input type="text" value="${escapeHtml(report.details || "—")}" readonly disabled>
                </label>
              </div>

              <div class="admin-actions">
                ${
                  report.status === "pending"
                    ? `
                      <button class="action-btn secondary report-action-btn" data-action="block">Принять и блокировать</button>
                      <button class="action-btn danger report-action-btn" data-action="delete">Принять и удалить</button>
                      <button class="action-btn report-action-btn" data-action="dismiss">Отклонить</button>
                    `
                    : `<span class="empty-state">Решение: ${escapeHtml(report.resolution_action || "—")} (${escapeHtml(formatReportDate(report.resolved_at))})</span>`
                }
              </div>
            </div>
          `;

          card.querySelectorAll(".report-action-btn").forEach((btn) => {
            btn.addEventListener("click", () => resolveReport(report, btn.dataset.action));
          });

          reportsList.appendChild(card);
        });
      }

      function applyFilters() {
        const q = globalSearch.value.trim().toLowerCase();

        const filteredUsers = allUsers.filter(
          (item) =>
            !q ||
            [item.id, item.username, item.email, item.role_id]
              .join(" ")
              .toLowerCase()
              .includes(q),
        );

        const filteredBots = allBots.filter(
          (item) =>
            !q ||
            [item.id, item.name, item.author_name, item.visibility, item.tags]
              .join(" ")
              .toLowerCase()
              .includes(q),
        );

        const filteredReports = allReports.filter(
          (item) =>
            !q ||
            [
              item.id,
              item.reporter_name,
              item.target_type,
              item.target_id,
              item.reason,
              item.details,
              item.status,
              item.bot_name,
              item.profile_name,
            ]
              .join(" ")
              .toLowerCase()
              .includes(q),
        );

        renderUsers(filteredUsers);
        renderBots(filteredBots);
        renderReports(filteredReports);
      }

      globalSearch.addEventListener("input", applyFilters);

      async function loadUsers() {
        try {
          const res = await fetch(`${API_BASE}/admin/users`, {
            headers: authHeaders(),
          });

          const data = await res.json();
          allUsers = Array.isArray(data) ? data : [];
          applyFilters();
        } catch (error) {
          notifyUser("Ошибка загрузки пользователей", "error");
          usersEmpty.style.display = "block";
          usersEmpty.textContent = "Ошибка загрузки пользователей";
        }
      }

      async function loadBots() {
        try {
          const res = await fetch(`${API_BASE}/admin/bots`, {
            headers: authHeaders(),
          });

          const data = await res.json();
          allBots = Array.isArray(data) ? data : [];
          applyFilters();
        } catch (error) {
          notifyUser("Ошибка загрузки ботов", "error");
          botsEmpty.style.display = "block";
          botsEmpty.textContent = "Ошибка загрузки ботов";
        }
      }

      async function loadReports() {
        try {
          const res = await fetch(`${API_BASE}/admin/reports`, {
            headers: authHeaders(),
          });
          const data = await res.json();
          allReports = Array.isArray(data) ? data : [];
          applyFilters();
        } catch {
          notifyUser("Ошибка загрузки жалоб", "error");
          reportsEmpty.style.display = "block";
          reportsEmpty.textContent = "Ошибка загрузки жалоб";
        }
      }

      loadUsers();
      loadBots();
      loadReports();
    </script>
  </body>
</html>
