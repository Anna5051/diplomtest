<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Авторизация</title>
    <link rel="stylesheet" href="/css/general.css" />
    <link rel="stylesheet" href="/css/autorization.css" />
    <script src="/js/runtime-config.js"></script>
    <script src="/js/api-base.js"></script>
    <script src="/js/notifications.js" defer></script>
  </head>

  <body>
    <header>
      <div class="container">
        <nav>
          <div class="logo">
            <img src="/img/icon.svg" alt="logo" />
            <a href="/pages/index.html">Charitor.ai</a>
          </div>

          <ul class="nav">
            <li><a href="/pages/register.html"><span class="nav-label-long">Зарегистрироваться</span><span class="nav-label-short">Регистрация</span></a></li>
            <li><a href="/pages/autorization.html">Войти</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h1>Авторизация</h1>

        <form class="auth-form" id="loginForm">
          <div id="formMessage" class="form-message" hidden></div>

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Введите email" required />

          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            placeholder="Введите пароль"
            required
          />

          <button type="submit" class="btn-main">Войти</button>

          <p class="login-text">Нет аккаунта?</p>

          <a href="/pages/register.html" class="btn-second"> Регистрация </a>
        </form>
      </div>
    </main>

    <footer class="app-doc-footer" role="contentinfo">
      <nav class="app-doc-footer-nav" aria-label="Документы и справка">
        <a href="/pages/docs/guide.html">Справка и инструкция</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/rules.html">Правила сообщества</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/faq.html">FAQ</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/privacy.html">Конфиденциальность</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/cookies.html">Cookie</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/about.html">О сервисе</a>
        <span class="app-doc-footer-sep" aria-hidden="true">·</span>
        <a href="/pages/docs/news.html">Новости</a>
      </nav>
    </footer>

    <script>
      const loginForm = document.getElementById("loginForm");
      const formMessage = document.getElementById("formMessage");
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function showMessage(text, type = "error") {
        formMessage.hidden = false;
        formMessage.textContent = text;
        formMessage.className = `form-message ${type}`;
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        showMessage("", "error");
        formMessage.hidden = true;

        if (!email || !password) {
          showMessage("Введите email и пароль");
          return;
        }

        if (!emailRegex.test(email)) {
          showMessage("Введите корректный email");
          return;
        }

        try {
          const response = await fetch(`${API_BASE}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();
          showMessage(data.message || "Готово", response.ok ? "success" : "error");

          if (response.ok) {
            localStorage.setItem("user", JSON.stringify(data.user));

            if (data.user.role_id === 2) {
              window.location.href = "/pages/admin.html";
            } else {
              window.location.href = "/pages/main.html";
            }
          }
        } catch (error) {
          showMessage("Ошибка соединения с сервером");
        }
      });
    </script>
  </body>
</html>
